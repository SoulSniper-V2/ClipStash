name: ClipStash
options:
  bundleIdPrefix: com.clipstash
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  ClipStash:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_NAME: ClipStash
        PRODUCT_BUNDLE_IDENTIFIER: com.clipstash.app
        MARKETING_VERSION: 2.3.0
        CURRENT_PROJECT_VERSION: 230
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: ClipStash
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: Y67PXRT5DY
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: minimal
